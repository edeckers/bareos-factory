<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-left" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1a24"/>
      <stop offset="100%" stop-color="#28222e"/>
    </linearGradient>

    <linearGradient id="bg-right" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>

    <radialGradient id="glow-left" cx="60%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#352e40" stop-opacity="1"/>
      <stop offset="100%" stop-color="#1e1a24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Left panel -->
  <rect x="0" y="0" width="560" height="640" fill="url(#bg-left)"/>
  <rect x="0" y="0" width="560" height="640" fill="url(#glow-left)"/>

  <!-- Right panel -->
  <rect x="560" y="0" width="720" height="640" fill="url(#bg-right)"/>

  <!-- === RIGHT SIDE: Overlapping containers, centered in panel === -->
  <!-- Right panel spans x=560 to x=1280, center = 920 -->
  <!-- Imagery group centered at ~920, vertically centered -->
  <g transform="translate(740, 110)">

    <!-- Container 1: far back, large -->
    <rect x="0" y="40" width="260" height="180" rx="16" fill="white" fill-opacity="0.08" stroke="white" stroke-opacity="0.20" stroke-width="1.5"/>

    <!-- Container 2: middle -->
    <rect x="80" y="120" width="220" height="160" rx="14" fill="white" fill-opacity="0.10" stroke="white" stroke-opacity="0.25" stroke-width="1.5"/>

    <!-- Container 3: overlapping -->
    <rect x="40" y="220" width="240" height="170" rx="14" fill="white" fill-opacity="0.12" stroke="white" stroke-opacity="0.30" stroke-width="1.5"/>

    <!-- Container 4: small, offset -->
    <rect x="140" y="80" width="180" height="130" rx="12" fill="white" fill-opacity="0.07" stroke="white" stroke-opacity="0.18" stroke-width="1.5"/>

    <!-- Container 5: bottom -->
    <rect x="120" y="280" width="200" height="140" rx="12" fill="white" fill-opacity="0.09" stroke="white" stroke-opacity="0.22" stroke-width="1.5"/>

    <!-- Cargo blocks — top cluster (white) -->
    <rect x="120" y="250" width="18" height="18" rx="3" fill="white" fill-opacity="0.30"/>
    <rect x="144" y="250" width="18" height="18" rx="3" fill="white" fill-opacity="0.30"/>
    <rect x="168" y="250" width="18" height="18" rx="3" fill="white" fill-opacity="0.30"/>
    <rect x="132" y="230" width="18" height="18" rx="3" fill="white" fill-opacity="0.22"/>
    <rect x="156" y="230" width="18" height="18" rx="3" fill="white" fill-opacity="0.22"/>
    <rect x="144" y="210" width="18" height="18" rx="3" fill="white" fill-opacity="0.14"/>

    <!-- Cargo blocks — middle cluster -->
    <rect x="90" y="150" width="14" height="14" rx="3" fill="white" fill-opacity="0.22"/>
    <rect x="108" y="150" width="14" height="14" rx="3" fill="white" fill-opacity="0.22"/>
    <rect x="126" y="150" width="14" height="14" rx="3" fill="white" fill-opacity="0.22"/>
    <rect x="99" y="134" width="14" height="14" rx="3" fill="white" fill-opacity="0.14"/>
    <rect x="117" y="134" width="14" height="14" rx="3" fill="white" fill-opacity="0.14"/>

    <!-- Cargo blocks — bottom cluster (slight yellow tint) -->
    <rect x="170" y="315" width="14" height="14" rx="3" fill="#fef08a" fill-opacity="0.20"/>
    <rect x="188" y="315" width="14" height="14" rx="3" fill="#fef08a" fill-opacity="0.20"/>
    <rect x="206" y="315" width="14" height="14" rx="3" fill="#fef08a" fill-opacity="0.20"/>
    <rect x="179" y="299" width="14" height="14" rx="3" fill="#fef08a" fill-opacity="0.12"/>

  </g>

  <!-- GitHub URL — bottom left -->
  <text x="66" y="600"
    font-family="ui-monospace, monospace"
    font-size="12" fill="#5a5564">
    github.com/edeckers/bareos-factory
  </text>

  <!-- Docker pull — bottom right, same height -->
  <text x="1240" y="600"
    font-family="ui-monospace, monospace"
    font-size="13" fill="white" fill-opacity="0.45" text-anchor="end">
    docker pull edeckers/bareos-dir
  </text>

  <!-- === LEFT SIDE: Typography (unchanged) === -->

  <text x="60" y="280"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="88" font-weight="800" fill="white" letter-spacing="-1">
    Bareos
  </text>

  <text x="60" y="370"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="88" font-weight="800" fill="#f97316" letter-spacing="-1">
    Factory
  </text>

  <text x="66" y="412"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="17" fill="#9a95a5">
    Multi-architecture Docker images
  </text>
  <text x="66" y="434"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="17" fill="#9a95a5">
    and .deb packages for Bareos
  </text>

  <!-- Pills -->
  <g transform="translate(66, 475)">
    <rect x="0" y="0" width="78" height="26" rx="13" fill="white" fill-opacity="0.06"/>
    <text x="39" y="13" font-family="ui-monospace, monospace" font-size="11" fill="#8a8594" text-anchor="middle" dominant-baseline="central">amd64</text>

    <rect x="90" y="0" width="78" height="26" rx="13" fill="white" fill-opacity="0.06"/>
    <text x="129" y="13" font-family="ui-monospace, monospace" font-size="11" fill="#8a8594" text-anchor="middle" dominant-baseline="central">arm64</text>

    <rect x="180" y="0" width="86" height="26" rx="13" fill="white" fill-opacity="0.06"/>
    <text x="223" y="13" font-family="ui-monospace, monospace" font-size="11" fill="#8a8594" text-anchor="middle" dominant-baseline="central">mpl-2.0</text>
  </g>

</svg>
