name: Check Upstream Bareos

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.scan.outputs.versions }}
      base: ${{ steps.scan.outputs.base }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0  # need our release tags for the per-major floor

      - name: Find releases we are missing
        id: scan
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          have="$(git tag | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | paste -sd,)"
          versions="$(bin/check-upstream.py \
            | bin/filter-releases.py --have "${have}" --latest-majors 2 \
                --skip-file .bareos-skip-releases \
            | python3 -c 'import sys, json; print(json.dumps(sys.stdin.read().split()))')"
          echo "versions=${versions}" >> "$GITHUB_OUTPUT"
          echo "base=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"

  propose-bumps:
    needs: detect
    if: needs.detect.outputs.versions != '[]' && needs.detect.outputs.versions != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJson(needs.detect.outputs.versions) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ needs.detect.outputs.base }}

      - name: Propose ${{ matrix.version }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Mainline major comes from .bareos-version, read BEFORE bump.sh
          # rewrites it. Same major as the version we ship -> PR into develop;
          # an older tracked major -> branch + tracking issue, never merged.
          mainline_major="$(cut -d. -f1 .bareos-version)"
          version_major="$(echo "${{ matrix.version }}" | cut -d. -f1)"

          bin/bump.sh "${{ matrix.version }}"

          if [ "${version_major}" = "${mainline_major}" ]; then
            bin/create-pr.sh "${{ matrix.version }}" "${{ needs.detect.outputs.base }}"
          else
            bin/open-bump-issue.sh "${{ matrix.version }}"
          fi
