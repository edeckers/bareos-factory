FileSet {
  Name = "LinuxDefault"
  Description = "Sensible default backup set: system config and user data."
  Include {
    Options {
      Signature = XXH128 # calculate checksum per file
      One FS = No        # /etc/bareos has a bind-mounted subdir; descend into it
    }
    File = "/etc"   # system configuration
    File = "/home"  # user home directories
    File = "/root"  # root's home (NOT under /home)
  }
}
