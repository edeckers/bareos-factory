Job {
  Name = "BackupCatalog"
  Description = "Backup the catalog database (after the nightly save)"
  JobDefs = "DefaultJob"
  Level = Full
  FileSet="Catalog"
  Schedule = "WeeklyCycleAfterBackup"

  # This creates an ASCII copy of the catalog
  # Arguments to make_catalog_backup are:
  #  make_catalog_backup <catalog-name>
  # NOTE: RunBeforeJob runs on the DIRECTOR (running on the FD would be
  #  "ClientRunBeforeJob"). make_catalog_backup writes the dump to
  #  /var/lib/bareos/bareos.sql inside the Director container, so we copy it
  #  into the shared 'catalog_dump' volume where the FD can read it.
  #  This copy is only needed because the Director and FD run in separate
  #  containers. In a traditional single-host install where both share the
  #  same filesystem, the FD sees /var/lib/bareos/bareos.sql directly and the
  #  second RunBeforeJob below is unnecessary.
  RunBeforeJob = "/usr/lib/bareos/scripts/make_catalog_backup MyCatalog"
  RunBeforeJob = "/usr/bin/cp /var/lib/bareos/bareos.sql /backups/bareos/catalog/bareos.sql"

  # This deletes the copy of the catalog
  RunAfterJob  = "/usr/lib/bareos/scripts/delete_catalog_backup MyCatalog"

  # This sends the bootstrap via mail for disaster recovery.
  # Should be sent to another system, please change recipient accordingly
  Write Bootstrap = "|/usr/bin/bsmtp -h localhost -f \"\(Bareos\) \" -s \"Bootstrap for Job %j\" root"
  Priority = 11                   # run after main backup
}
