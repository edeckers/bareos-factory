services:
  # PostgreSQL database for Bareos Director catalog
  postgres:
    image: postgres:18-alpine
    container_name: bareos-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - bareos
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Makes the shared catalog_dump volume writable by the bareos user.
  # See examples/README.md "Catalog Backup" for why this is needed.
  catalog-init:
    image: edeckers/bareos-dir:25.0.3
    container_name: bareos-catalog-init
    user: root
    entrypoint: ["chown", "-R", "bareos:bareos", "/backups/bareos/catalog"]
    volumes:
      - catalog_dump:/backups/bareos/catalog
    restart: "no"

  director:
    image: edeckers/bareos-dir:25.0.3
    container_name: bareos-director
    hostname: bareos-dir
    depends_on:
      postgres:
        condition: service_healthy
      catalog-init:
        condition: service_completed_successfully
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: bareos
      DB_USER: bareos
      DB_PASSWORD: bareos
      # Bareos assumes filenames are UTF-8. Without a UTF-8 locale, non-ASCII
      # filenames can be mishandled when written to the catalog (Bareos
      # "Critical Items to Implement Before Production" docs). Scoped per-container
      # here so it can't affect the host; for a native install you'd set this on
      # the systemd unit (Environment=) rather than overriding the host locale.
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    ports:
      - "9101:9101"
    volumes:
      - ./config/bareos-dir/bareos-dir.d:/etc/bareos/bareos-dir.d:ro
      - ./config/bareos-dir/bconsole.conf:/etc/bareos/bconsole.conf:ro
      # Shared catalog dump: Director writes here (RunBeforeJob), FD reads it.
      - catalog_dump:/backups/bareos/catalog
    networks:
      - bareos
    restart: unless-stopped

  storage:
    image: edeckers/bareos-sd:25.0.3
    container_name: bareos-storage
    hostname: bareos-sd
    environment:
      # UTF-8 locale, same reason as the director.
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    ports:
      - "9103:9103"
    volumes:
      # Disabled: removing entirely in next release.
      # - storage_config:/etc/bareos
      - storage_data:/var/lib/bareos/storage
      - ./config/bareos-sd/bareos-sd.d/director/bareos-dir.conf:/etc/bareos/bareos-sd.d/director/bareos-dir.conf:ro
    networks:
      - bareos
    restart: unless-stopped

  filedaemon:
    image: edeckers/bareos-fd:25.0.3
    container_name: bareos-filedaemon
    hostname: bareos-fd
    # Backup agents need root to read files they don't own. Without this the FD
    # can only back up bareos:bareos files, which is useless for real backups.
    user: root
    depends_on:
      catalog-init:
        condition: service_completed_successfully
    environment:
      # UTF-8 locale, same reason as the director.
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    ports:
      - "9102:9102"
    volumes:
      # Disabled: removing entirely in next release.
      # - filedaemon_config:/etc/bareos
      - ./config/bareos-fd/bareos-fd.d:/etc/bareos/bareos-fd.d:ro
      # Shared catalog dump (read-only): the BackupCatalog job reads bareos.sql here.
      - catalog_dump:/backups/bareos/catalog:ro
      # Mount directories you want to backup
      # - /path/to/backup:/data:ro
    networks:
      - bareos
    restart: unless-stopped

networks:
  bareos:
    driver: bridge

volumes:
  postgres_data:
  storage_data:
  # Shared between Director (rw) and File Daemon (ro) so the catalog dump the
  # Director writes is visible to the FD that backs it up.
  catalog_dump:
  # Disabled: removing entirely in next release.
  # storage_config:
  # filedaemon_config:
